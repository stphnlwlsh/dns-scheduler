image: google/cloud-sdk:alpine

variables:
  # Terraform plan cache filename
  TF_PLAN_CACHE: "plan.cache"
  
  # Backend configuration for GitLab state management
  # These will be automatically configured by GitLab CI/CD
  TF_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/dns-scheduler"
  TF_USERNAME: "gitlab-ci-token"
  TF_PASSWORD: "${CI_JOB_TOKEN}"
  
  # GCP Workload Identity Federation
  WORKLOAD_IDENTITY_PROVIDER: "projects/494349858621/locations/global/workloadIdentityPools/gitlab-pool/providers/gitlab-provider"
  SERVICE_ACCOUNT_EMAIL: "gitlab-ci-dns-scheduler@cwaw-prod-dns-scheduler-85632c.iam.gserviceaccount.com"

.setup_gcp: &setup_gcp
  before_script:
    # Install OpenTofu
    - apk add --no-cache curl unzip
    - curl -L https://github.com/opentofu/opentofu/releases/download/v1.8.4/tofu_1.8.4_linux_amd64.zip -o tofu.zip
    - unzip -o tofu.zip && chmod +x tofu && mv tofu /usr/local/bin/tofu
    - tofu version
    # Setup GCP authentication
    - cd terraform
    - echo $OIDC_TOKEN > /tmp/oidc_token
    - cp ../credential-config.json /tmp/credential-config.json
    - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/credential-config.json
    - gcloud auth login --cred-file=/tmp/credential-config.json
    - gcloud config set project $GOOGLE_PROJECT_ID

stages:
  - validate
  - plan
  - deploy

# Validate OpenTofu configuration
tofu:validate:
  <<: *setup_gcp
  stage: validate
  id_tokens:
    OIDC_TOKEN:
      aud: https://iam.googleapis.com/projects/494349858621/locations/global/workloadIdentityPools/gitlab-pool/providers/gitlab-provider
  script:
    - tofu init -backend-config="address=${TF_ADDRESS}" -backend-config="username=${TF_USERNAME}" -backend-config="password=${TF_PASSWORD}"
    - tofu validate
    - tofu fmt -check

# Plan OpenTofu changes
tofu:plan:
  <<: *setup_gcp
  stage: plan
  id_tokens:
    OIDC_TOKEN:
      aud: https://iam.googleapis.com/projects/494349858621/locations/global/workloadIdentityPools/gitlab-pool/providers/gitlab-provider
  script:
    - tofu init -backend-config="address=${TF_ADDRESS}" -backend-config="username=${TF_USERNAME}" -backend-config="password=${TF_PASSWORD}"
    - tofu plan -out=${TF_PLAN_CACHE}
  artifacts:
    paths:
      - terraform/${TF_PLAN_CACHE}
    expire_in: 7 days

# Apply OpenTofu changes (manual deployment)
tofu:deploy:
  <<: *setup_gcp
  stage: deploy
  when: manual
  only:
    - main
    - master
  id_tokens:
    OIDC_TOKEN:
      aud: https://iam.googleapis.com/projects/494349858621/locations/global/workloadIdentityPools/gitlab-pool/providers/gitlab-provider
  script:
    - tofu init -backend-config="address=${TF_ADDRESS}" -backend-config="username=${TF_USERNAME}" -backend-config="password=${TF_PASSWORD}"
    - tofu apply ${TF_PLAN_CACHE}
  dependencies:
    - tofu:plan
