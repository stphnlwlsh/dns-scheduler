image: google/cloud-sdk:alpine

variables:
  # Terraform plan cache filename
  TF_PLAN_CACHE: "plan.cache"

  # Backend configuration for GitLab state management
  # These will be automatically configured by GitLab CI/CD
  TF_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/dns-scheduler"
  TF_USERNAME: "gitlab-ci-token"
  TF_PASSWORD: "${CI_JOB_TOKEN}"

  # GCP variables are set in GitLab CI/CD Settings -> Variables:
  # - GCP_PROJECT_ID
  # - GCP_REGION
  # - GCP_SERVICE_ACCOUNT_EMAIL
  # - GCP_GCP_WORKLOAD_IDENTITY_PROVIDER

  # Terraform variables (set in GitLab CI/CD settings)
  TF_VAR_project_id: "${GCP_PROJECT_ID}"
  TF_VAR_nextdns_profile_id: "${NEXTDNS_PROFILE_ID}"
  TF_VAR_nextdns_api_key: "${NEXTDNS_API_KEY}"
  TF_VAR_nextdns_profile_id_2: "${NEXTDNS_PROFILE_ID_2}"

.setup_gcp: &setup_gcp
  before_script:
    # Install OpenTofu and zip
    - apk add --no-cache curl unzip zip
    - curl -L https://github.com/opentofu/opentofu/releases/download/v1.8.4/tofu_1.8.4_linux_amd64.zip -o tofu.zip
    - unzip -o tofu.zip && chmod +x tofu && mv tofu /usr/local/bin/tofu
    - tofu version
    # Setup GCP authentication
    - cd terraform
    - echo $OIDC_TOKEN > /tmp/oidc_token
    - cp ../credential-config.json /tmp/credential-config.json
    - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/credential-config.json
    - gcloud config set project $GCP_PROJECT_ID
    - gcloud auth login --cred-file=/tmp/credential-config.json
    # Set backend configuration as environment variables
    - export TF_HTTP_ADDRESS="${TF_ADDRESS}"
    - export TF_HTTP_USERNAME="${TF_USERNAME}"
    - export TF_HTTP_PASSWORD="${TF_PASSWORD}"

stages:
  - validate
  - plan
  - deploy

# Validate OpenTofu configuration
tofu:validate:
  <<: *setup_gcp
  stage: validate
  id_tokens:
    OIDC_TOKEN:
      aud: "https://iam.googleapis.com/${GCP_WORKLOAD_IDENTITY_PROVIDER}"
  script:
    - tofu init
    - tofu validate
    - tofu fmt -check

# Plan OpenTofu changes
tofu:plan:
  <<: *setup_gcp
  stage: plan
  id_tokens:
    OIDC_TOKEN:
      aud: "https://iam.googleapis.com/${GCP_WORKLOAD_IDENTITY_PROVIDER}"
  script:
    - tofu init
    - tofu plan -out=${TF_PLAN_CACHE}
  artifacts:
    paths:
      - terraform/${TF_PLAN_CACHE}
    expire_in: 7 days

# Apply OpenTofu changes (manual deployment)
tofu:deploy:
  <<: *setup_gcp
  stage: deploy
  when: manual
  only:
    - main
    - master
  id_tokens:
    OIDC_TOKEN:
      aud: "https://iam.googleapis.com/${GCP_WORKLOAD_IDENTITY_PROVIDER}"
  script:
    - tofu init
    - tofu apply ${TF_PLAN_CACHE}
  dependencies:
    - tofu:plan
