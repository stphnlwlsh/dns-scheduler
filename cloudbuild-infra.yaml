substitutions:
  _IMAGE_TAG: "latest"

steps:
  - name: "alpine"
    id: install-tofu
    entrypoint: sh
    args:
      - -c
      - |
        apk add --no-cache curl unzip
        curl -L https://github.com/opentofu/opentofu/releases/download/v1.8.4/tofu_1.8.4_linux_amd64.zip -o /workspace/tofu.zip
        unzip -o /workspace/tofu.zip -d /workspace
        chmod +x /workspace/tofu

  - name: "alpine"
    id: validate
    entrypoint: sh
    args:
      - -c
      - |
        export PATH="/workspace:$$PATH"
        cd terraform
        tofu init
        tofu validate

  - name: "alpine"
    id: plan
    entrypoint: sh
    args:
      - -c
      - |
        export PATH="/workspace:$$PATH"
        cd terraform
        tofu plan -var="project_id=${PROJECT_ID}" -var="image_tag=$_IMAGE_TAG"

  - name: "alpine"
    id: apply
    entrypoint: sh
    args:
      - -c
      - |
        export PATH="/workspace:$$PATH"
        cd terraform
        tofu apply -auto-approve -var="project_id=${PROJECT_ID}" -var="image_tag=$_IMAGE_TAG"
    waitFor:
      - plan

options:
  logging: CLOUD_LOGGING_ONLY
