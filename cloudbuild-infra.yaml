substitutions:
  _IMAGE_TAG: "latest"
  _NEXTDNS_API_KEY_SECRET: "NEXTDNS_API_KEY"
  _NEXTDNS_PROFILE_ID_SECRET: "NEXTDNS_PROFILE_ID"
  _NEXTDNS_PROFILE_ID_SECRET_2: "NEXTDNS_PROFILE_ID_2"

steps:
  - name: "alpine"
    id: install-tofu
    entrypoint: sh
    args:
      - -c
      - |
        apk add --no-cache curl unzip
        curl -L https://github.com/opentofu/opentofu/releases/download/v1.8.4/tofu_1.8.4_linux_amd64.zip -o /workspace/tofu.zip
        unzip -o /workspace/tofu.zip -d /workspace
        chmod +x /workspace/tofu

  - name: "hashicorp/terraform:1.8.4"
    id: apply
    entrypoint: sh
    args:
      - -c
      - |
        export PATH="/workspace:$$PATH"
        # Expose secrets to Terraform/Tofu. It automatically picks up TF_VAR_ variables.
        export TF_VAR_nextdns_api_key=$$NEXTDNS_API_KEY
        export TF_VAR_nextdns_profile_id=$$NEXTDNS_PROFILE_ID
        export TF_VAR_nextdns_profile_id=$$NEXTDNS_PROFILE_ID_2
        cd terraform
        tofu init
        # Pass non-secret variables via -var flag
        tofu apply -auto-approve -var="project_id=$$PROJECT_ID" -var="image_tag=$_IMAGE_TAG"
    waitFor:
      - install-tofu
    secretEnv:
      - "NEXTDNS_API_KEY"
      - "NEXTDNS_PROFILE_ID"
      - "NEXTDNS_PROFILE_ID_2"

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/${_NEXTDNS_API_KEY_SECRET}/versions/latest
      env: "NEXTDNS_API_KEY"
    - versionName: projects/$PROJECT_ID/secrets/${_NEXTDNS_PROFILE_ID_SECRET}/versions/latest
      env: "NEXTDNS_PROFILE_ID"
    - versionName: projects/$PROJECT_ID/secrets/${_NEXTDNS_PROFILE_ID_SECRET_2}/versions/latest
      env: "NEXTDNS_PROFILE_ID_2"
