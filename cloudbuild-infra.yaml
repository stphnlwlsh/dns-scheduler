steps:
  - name: "alpine"
    id: install-tofu
    entrypoint: sh
    args:
      - -c
      - |
        apk add --no-cache curl unzip
        curl -L https://github.com/opentofu/opentofu/releases/download/v1.8.4/tofu_1.8.4_linux_amd64.zip -o /workspace/tofu.zip
        unzip -o /workspace/tofu.zip -d /workspace
        chmod +x /workspace/tofu

  - name: "alpine"
    id: validate
    entrypoint: sh
    args:
      - -c
      - |
        export PATH="/workspace:$$PATH"
        cd terraform
        tofu init
        tofu validate

  - name: "alpine"
    id: plan
    entrypoint: sh
    args:
      - -c
      - |
        export PATH="/workspace:$$PATH"
        cd terraform
        export TF_VAR_nextdns_api_key=$$NEXTDNS_API_KEY
        export TF_VAR_nextdns_profile_id=$$NEXTDNS_PROFILE_ID
        export TF_VAR_nextdns_profile_id=$$NEXTDNS_PROFILE_ID_2
        tofu plan -var="project_id=${PROJECT_ID}"
    secretEnv:
      - "NEXTDNS_API_KEY"
      - "NEXTDNS_PROFILE_ID"
      - "NEXTDNS_PROFILE_ID_2"
  - name: "alpine"
    id: apply
    entrypoint: sh
    args:
      - -c
      - |
        export PATH="/workspace:$$PATH"
        cd terraform
        export TF_VAR_nextdns_api_key=$$NEXTDNS_API_KEY
        export TF_VAR_nextdns_profile_id=$$NEXTDNS_PROFILE_ID
        export TF_VAR_nextdns_profile_id=$$NEXTDNS_PROFILE_ID_2
        tofu apply -auto-approve -var="project_id=${PROJECT_ID}"
    waitFor:
      - plan
    secretEnv:
      - "NEXTDNS_API_KEY"
      - "NEXTDNS_PROFILE_ID"
      - "NEXTDNS_PROFILE_ID_2"

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NEXTDNS_API_KEY/versions/latest
      env: "NEXTDNS_API_KEY"
    - versionName: projects/$PROJECT_ID/secrets/NEXTDNS_PROFILE_ID/versions/latest
      env: "NEXTDNS_PROFILE_ID"
    - versionName: projects/$PROJECT_ID/secrets/NEXTDNS_PROFILE_ID_2/versions/latest
      env: "NEXTDNS_PROFILE_ID_2"
